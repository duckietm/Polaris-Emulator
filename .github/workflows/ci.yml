name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  build:
    name: Build + unit + integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Emulator

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify local build handoff
        shell: pwsh
        run: ../scripts/build-latest.test.ps1

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      # `verify` runs the unit tests (Surefire) and the *IT integration tests
      # (Failsafe), which build the schema by running the real timestamped migrations
      # against a Testcontainers MariaDB. A broken migration fails the build.
      - name: Build and test
        run: mvn -B verify

      - name: Upload furni consistency fixture report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: furni-consistency-fixture-report
          path: Emulator/target/furni-consistency-fixture.json
          if-no-files-found: error

  migration-matrix:
    name: Migrations on MariaDB ${{ matrix.mariadb }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Minimum-supported and recommended MariaDB releases.
        mariadb:
          - "mariadb:10.11.14@sha256:dbe56e20372fc6d6b8e0e396866ba89c4c7f128c38c4f59aaa54d957db95790c"
          - "mariadb:11.4.12@sha256:a794d9eb009e20de605858a11f32f63b4075cbd197c650436f0e3b457e4caed7"
    defaults:
      run:
        working-directory: Emulator

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Verify migrations against ${{ matrix.mariadb }}
        env:
          POLARIS_TEST_MARIADB_IMAGE: ${{ matrix.mariadb }}
        run: mvn -B test-compile failsafe:integration-test failsafe:verify -Dit.test=MigrationRunnerIT

  backup-restore:
    name: Migration backup + restore
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4.12@sha256:a794d9eb009e20de605858a11f32f63b4075cbd197c650436f0e3b457e4caed7
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    defaults:
      run:
        working-directory: Emulator

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install MariaDB client tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes mariadb-client

      - name: Verify backup, drop and restore
        env:
          MIGRATION_TEST_DB_HOST: 127.0.0.1
          MIGRATION_TEST_DB_PORT: 3306
          MIGRATION_TEST_DB_USER: root
          MIGRATION_TEST_DB_PASSWORD: root
        run: mvn -B -Dtest=MariaDbMigrationBackupIntegrationTest test
