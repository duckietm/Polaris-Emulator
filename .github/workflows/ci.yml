name: CI

on:
  pull_request:
    branches: [dev]
  push:
    branches-ignore: [dev]

permissions:
  contents: read

jobs:
  build:
    name: Build + unit + integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Emulator

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      # `verify` runs the unit tests (Surefire) and the *IT integration tests
      # (Failsafe), which build the schema by running the real V1..Vn migrations
      # against a Testcontainers MariaDB. A broken migration fails the build.
      - name: Build and test
        run: mvn -B verify

  migration-matrix:
    name: Migrations on MariaDB ${{ matrix.mariadb }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Minimum-supported and recommended MariaDB releases.
        mariadb: ["mariadb:10.11", "mariadb:11"]
    defaults:
      run:
        working-directory: Emulator

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Verify migrations against ${{ matrix.mariadb }}
        env:
          POLARIS_TEST_MARIADB_IMAGE: ${{ matrix.mariadb }}
        run: mvn -B test-compile failsafe:integration-test failsafe:verify -Dit.test=MigrationRunnerIT
